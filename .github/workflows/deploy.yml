name: deploy

# The site is plain static HTML/CSS/JS — no build step.
# GitHub Pages serves the gh-pages branch; this workflow publishes to it.
#
# Triggers:
#   - push to master: deploys automatically
#   - workflow_dispatch: manual deploy from ANY branch (Actions -> deploy ->
#     Run workflow -> pick the branch). Use this to publish a feature branch
#     (e.g. redesign-antigravity) to the live site without merging it.

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
