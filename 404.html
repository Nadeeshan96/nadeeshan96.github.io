<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 — Nadeeshan Dissanayake</title>
  <link rel="shortcut icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚛️</text></svg>">
  <link rel="stylesheet" href="/assets/css/style.css">
  <style>
    .notfound {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .notfound h1 {
      font-family: var(--font-display);
      font-size: clamp(4rem, 14vw, 8rem);
      background: linear-gradient(100deg, #ffffff 10%, var(--accent-1) 55%, var(--accent-2) 95%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1;
    }
    .notfound p { color: var(--text-dim); margin: 1rem 0 2rem; }
    .notfound a.btn {
      font-family: var(--font-display);
      border: 1px solid var(--border-bright);
      border-radius: 999px;
      padding: 0.6rem 1.4rem;
      color: var(--text);
    }
    .notfound a.btn:hover { text-decoration: none; box-shadow: 0 6px 24px rgba(108, 140, 255, 0.25); }
  </style>
</head>
<body>
  <main class="notfound">
    <h1>404</h1>
    <p>This page seems to have floated away.</p>
    <a class="btn" href="/">Back to home</a>
  </main>
</body>
</html>
